name: sanitizers

on:
  push:
    branches:
    - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc15, clang19]
        # Since Leak is usually part of Address, we do not run it separately in
        # CI. Keeping Address and Undefined separate for easier debugging
        sanitizer: [Thread,
                    Address,
                    Undefined]
        # Memory sanitizer triggers on almost anything and some of the things
        # are outside our control. Additionally, there seem to be
        # inconsistencies between local and CI runs, so disabling this for now
        #
        # include:
        #   # Memory sanitizer is not available for gcc
        #   - compiler: clang10
        #     sanitizer: MemoryWithOrigin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: cvmfs-contrib/github-action-cvmfs@10197e000cc0add8e54ac4fb73d3ed44e2de72b4
      - uses: key4hep/key4hep-actions/cache-external-data@main
      - uses: aidasoft/run-lcg-view@d8db17c61216548c9192889942d46ff2d7c3a3b6
        with:
          release-platform: LCG_108/x86_64-el9-${{ matrix.compiler }}-opt
          ccache-key: ccache-sanitizers-el9-${{ matrix.compiler }}-${{ matrix.sanitizer }}
          run: |
            echo "::group::Run CMake"
            cmake -B build -S . \
              --preset ci-build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DUSE_SANITIZER=${{ matrix.sanitizer }} \
              -DCMAKE_CXX_STANDARD=$([[ ${{ matrix.compiler }} == gcc15 ]] && echo "23" || echo "20")
            echo "::endgroup::"
            echo "::group::Build"
            cmake --build --preset ci-build
            echo "::endgroup::"
            echo "::group::Run tests"
            ctest --test-dir build --output-on-failure --schedule-random -j$(nproc)
            echo "::endgroup::"
